name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: node20-linux-x64
            sidecar-name: skima-server-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: node20-win-x64
            sidecar-name: skima-server-x86_64-pc-windows-msvc.exe
          # macOS sidecars are NOT built in CI. We discovered that
          # `@yao-pkg/pkg`'s prebuilt Node 20.20.2 binary embeds an ICU
          # data table that aborts at v8::Isolate::Initialize when run
          # on macOS 26 Tahoe — regardless of whether the runner is
          # macos-15 (Sequoia) or macos-26 itself. The same pkg invocation
          # from a Mac that already had the pre-regression pkg-fetch
          # cache produces a binary that works; CI runners always pull
          # fresh and get the broken binary.
          #
          # Workaround: the two macOS sidecars are built locally on
          # a Mac with a known-good pkg-fetch cache and uploaded to a
          # separate "sidecar-binaries-v1" GitHub release. The macOS
          # rows below skip pkg entirely and `gh release download`
          # those assets. Linux + Windows still build normally because
          # they are not affected by the pkg ICU bug.
          #
          # Permanent fix (tracked for v1.4.2): migrate the sidecar from
          # @yao-pkg/pkg to `bun build --compile` + Prisma 7 driver
          # adapter, which builds reproducibly from any Linux host and
          # eliminates the pkg ICU coupling.
          - platform: ubuntu-22.04
            target: node20-macos-x64
            sidecar-name: skima-server-x86_64-apple-darwin
            prebuilt: true
          - platform: ubuntu-22.04
            target: node20-macos-arm64
            sidecar-name: skima-server-aarch64-apple-darwin
            prebuilt: true

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Server Dependencies
        if: '!matrix.prebuilt'
        run: cd server && npm install

      - name: Generate Prisma Client
        if: '!matrix.prebuilt'
        run: cd server && npx prisma generate

      - name: Download prebuilt macOS sidecar
        if: matrix.prebuilt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p src-tauri/binaries
          gh release download sidecar-binaries-v1 \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.sidecar-name }}" \
            --output "src-tauri/binaries/${{ matrix.sidecar-name }}"

      - name: Build Sidecar
        if: '!matrix.prebuilt'
        run: |
          cd server
          npx @yao-pkg/pkg . --target ${{ matrix.target }} --output "../src-tauri/binaries/${{ matrix.sidecar-name }}" --compress GZip

      - name: Upload Sidecar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: src-tauri/binaries/${{ matrix.sidecar-name }}

  create-release:
    needs: build-sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release with changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Skima ${{ github.ref_name }}" \
            --generate-notes \
            --latest

  build-tauri:
    needs: [build-sidecar, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          # macOS split into per-arch builds. We used to produce a single
          # --target universal-apple-darwin .dmg via `lipo -create` on the
          # Node sidecar, but the resulting universal binary crashed on
          # M-series Macs at v8::Isolate::Initialize. Each arch now ships
          # its own .dmg so the sidecar stays native to the host. Tauri's
          # latest.json auto-aggregator (aggregate-updater-json job below)
          # collates the darwin-aarch64 and darwin-x86_64 entries.
          #
          # We pin macos-26 (Tahoe) explicitly rather than macos-latest
          # because the .dmg has to be assembled with the same OS as the
          # sidecar so any ICU references the OS ships agree across the
          # bundle. macos-latest is still macos-15 (Sequoia) until the
          # 2026-06-15 → 2026-07-15 migration completes.
          - platform: macos-26
            args: '--target aarch64-apple-darwin'
            mac-arch: aarch64
          - platform: macos-26-intel
            args: '--target x86_64-apple-darwin'
            mac-arch: x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Each macOS job only needs its own Rust target.
          targets: ${{ matrix.mac-arch == 'aarch64' && 'aarch64-apple-darwin' || (matrix.mac-arch == 'x86_64' && 'x86_64-apple-darwin' || '') }}

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Dependencies
        run: |
          npm install
          cd client && npm install

      # Download sidecar binaries for this platform
      - name: Download Sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/download-artifact@v4
        with:
          name: sidecar-node20-linux-x64
          path: src-tauri/binaries/

      - name: Download Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/download-artifact@v4
        with:
          name: sidecar-node20-win-x64
          path: src-tauri/binaries/

      - name: Download Sidecar (macOS arm64)
        if: matrix.mac-arch == 'aarch64'
        uses: actions/download-artifact@v4
        with:
          name: sidecar-node20-macos-arm64
          path: src-tauri/binaries/

      - name: Download Sidecar (macOS x64)
        if: matrix.mac-arch == 'x86_64'
        uses: actions/download-artifact@v4
        with:
          name: sidecar-node20-macos-x64
          path: src-tauri/binaries/

      # No `lipo -create` step — see matrix comment for why. Each macOS
      # job now ships only its native sidecar.

      - name: Make Sidecar Executable
        if: matrix.platform != 'windows-latest'
        run: chmod +x src-tauri/binaries/skima-server-*

      # src-tauri/resources/ is now always present (Assets.car is committed),
      # so we no longer need a "mkdir -p" pre-step. The previous step used
      # bash's `mkdir -p` which fails on the Windows runner's PowerShell.

      # macOS 26 (Tahoe) wraps any app whose bundle lacks a modern Asset
      # Catalog (Assets.car keyed by CFBundleIconName) in a gray "squircle
      # jail" container. The catalog is shipped pre-compiled in
      # src-tauri/resources/Assets.car (built locally via
      # scripts/build-macos.sh from src-tauri/icons/Skima.icon) because
      # the macos-latest runners still use Xcode <26 — actool there does
      # not produce a usable .car for the .icon source format. Tauri
      # picks the catalog up via bundle.resources ("resources/*") and
      # merges src-tauri/Info.plist (CFBundleIconName=Skima) into the
      # final Info.plist before signing.
      #
      # When GitHub adds a macos-26 runner with Xcode 26+, we can drop
      # the committed Assets.car and reintroduce the `xcrun actool ...`
      # step here. Tracking issue: see repo issues for "macos-26 runner".

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — produces .sig files and the latest.json manifest
          # the auto-updater reads at runtime. Without these the bundle is unsigned
          # and existing v1.4.0+ clients will refuse the update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # NOTE on macOS code signing: Apple Developer Program enrollment is
          # deferred (see issue #54). The .app bundle is built with ad-hoc
          # signing (signingIdentity: "-" in tauri.macos.conf.json) so the
          # bundler succeeds without a real cert. Result: users still see
          # Gatekeeper warning on first launch and apply the documented
          # workaround. When Apple secrets are added, remove the "-" identity
          # and add the 6 APPLE_* env vars below the GITHUB_TOKEN line.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skima ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: false
          # Tags shaped vX.Y.Z-rc.N (or -beta.N, -alpha.N) are published as
          # GitHub prereleases so they do not show up under /releases/latest/
          # and existing v1.4.0 users are not auto-prompted to "upgrade" to
          # an RC. Plain semver tags (vX.Y.Z) continue to publish as normal.
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # Validate latest.json after all matrix jobs complete (issue #51).
  # tauri-action's per-platform uploads can leave the manifest with a partial
  # set of platforms if a job's updater artifact step silently skipped (e.g.
  # macOS before bundle.targets included "app"). This job audits the final
  # manifest and re-publishes it with a fresh pub_date as the canonical
  # "release fully aggregated" signal. Runs even if some build-tauri jobs
  # fail so partial-but-functional manifests still get the audit trail.
  # Ensure -rc., -beta., -alpha. tags publish as GitHub prereleases.
  # tauri-action accepts an explicit `prerelease` input but as of v0.5.x
  # has occasionally landed in `false` even when the input evaluates to
  # `true` (template-rendered booleans don't always survive the action's
  # internal type coercion). This step re-asserts the flag once after all
  # build matrix jobs have either succeeded or failed, so the prerelease
  # state is correct regardless of which platforms actually published.
  set-prerelease-flag:
    needs: [build-tauri]
    if: always() && (contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.'))
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --prerelease --repo "${{ github.repository }}"

  aggregate-updater-json:
    needs: [build-tauri]
    if: always() && needs.build-tauri.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Aggregate and validate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/aggregate-updater-json.js
